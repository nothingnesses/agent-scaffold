[[question]]
id = "Q-39"
status = "decided"
ask = """format-check execution and isolation under the checks module: treefmt v2 (this project's `nix fmt`) has NO non-mutating dry-run, so a `kind = "format"` check via `--fail-on-change` FORMATS IN PLACE then reports; this would mutate the user's working tree (and, in a pre-commit hook, risk clobbering unstaged changes). 2b corrected the WORDING (the checks-reviewer authors only findings; a format check on an in-place formatter mutates a discardable copy). DECIDED (human, 2026-07-18): the `agent-scaffold checks` subcommand runs the checks in a SEPARATE, TEMPORARY git worktree (never the live tree), removed when the run finishes (including on failure/interrupt), so the current tree is never clobbered. This makes in-place format checks safe and matches the project's git-is-the-recovery-substrate and writer-isolation model. Content selection: a plain `checks` run isolates the current WORKING-TREE state (e.g. via a `git stash create` commit of the dirty state, or HEAD when clean); `checks --staged` isolates the STAGED/index content (e.g. a tree written from the index), so the pre-commit hook checks exactly what will be committed without touching unstaged work. Implementation plumbing (git primitives, edge cases: empty repo, no commits, clean tree) is worked out in 2c and verified by its risky review loop."""
folded_into = "optional-modules"

[[question]]
id = "Q-40"
status = "decided"
ask = """representing a human-authorized convergence below the required clean-round streak so `validate --workflow` (W3) does not false-flag it: DECIDED (human, 2026-07-18) the escalation-record-aware approach (W3 accepts an increment's recorded streak when its records carry a `type:"escalation"` `human_decision:"decision"` record; reuses existing log data, no new schema/status, scoped and auditable). RESOLVED and built in `waiver-model` (2026-07-18): the escalation-record-aware idea was refined into the unified waiver, an explicit `accepted-at-escalation` `record-backed` `type:"waiver"` record whose `evidence` W5 validates against the increment's real `type:"escalation" human_decision:"decision"` record (rather than W3 silently auto-accepting on escalation presence), so the exemption is a declared, unit-scoped, auditable log line. Decision and outcome are in the `waiver-model` Step Detail. `optional-modules` increment 2c-ii was RISKY (its review found three high-severity write-escapes) but converged at ONE clean round, not two, because at the 5-round total-cap the human decided (per the escalation contract) to accept it, the dangerous write-escape class being closed and independently confirmed. Its round records are therefore risky with a peak `consecutive_clean` of 1, which W3 (risky requires peak >= 2) will flag as non-converged when `optional-modules` is eventually marked `complete` (after increment 3). Neither `trivial` nor `grandfathered` fits (it is neither review-skipped nor pre-logging). MUST be resolved before `optional-modules` is marked complete. Candidate approaches to bring to the human: an escalation-decision-aware exemption in W3 (a `type:"escalation"` record with `human_decision:"decision"` for the increment authorises its recorded streak); a per-increment override marker/status; or record the human-accepted lower streak as an explicit accepted-risk annotation W3 reads. Related to the severity-trajectory convergence idea recorded in `workflow-calibration`. This gap was surfaced by this very session's dogfooding (the meta-value of the workflow reviewing itself)."""
folded_into = "waiver-model"

[[question]]
id = "Q-41"
status = "decided"
ask = """`optional-modules` increment 3 (the isolation module) concrete file shape: the DIRECTION is already decided (pointer-scaffolding, not real container integration; `Q-33`/`Q-36`, design record `docs/plans/cross-harness-isolation.explorations/q33-q36-{A,B}.md`), but the step detail owes "its own design pass" on the exact integration shape, which files the `--module isolation` bundle drops and how they point a project at agent-box (`https://github.com/0xferrous/agent-box`) and agent-images (`https://github.com/nothingnesses/agent-images`) for worktree/container writer-agent isolation. A design pass is owed; the item points at `docs/plans/optional-modules-inc3.explorations/`. Grounding for the pass: the checks module (increment 2) is the template for how a content module lives in the pack (a `[[module]]` with a `guidance` partial rendered into `{{modules}}`, plus module-tagged assets, create-if-absent working files vs reference files); agent-box uses a global `~/.agent-box.toml` plus `ab spawn --local` and `ab new`/`ab spawn -s <session> --git` (worktree mode) over agent-images OCI images. The deferred growth path (a `.agents/spawn.toml` role->launch map + an agent-box container-wrapper shim) is already recorded in the step detail and stays deferred; this pass settles only the pointer-scaffolding content that ships now. Design pass DONE (two explorers, `docs/plans/optional-modules-inc3.explorations/isolation-module-shape-{A,B}.md`). Both converge on the skeleton: one `[[module]] isolation` entry with `guidance = "isolation-guidance.md"` and no `requires` (orthogonal to checks), one guidance partial `pack/isolation-guidance.md` rendered into `{{modules}}` (points at the `agent-isolation` rule for the tier policy, supplies only the container-tier wiring: agent-images `nix build`/`podman load`, the global `~/.agent-box.toml` shape, the `ab new`/`ab spawn --git` worktree flow, and preflight detection), byte-identical when off, no runtime dependency, no shelling out. They DIFFER on ONE point, the open decision: whether to ALSO drop a project-local working file `.agents/isolation/README.md` (create-if-absent). Explorer A (minimalism/safety): NO, guidance-only, because agent-box config is a per-user GLOBAL file so there is nothing project-local to own and a dropped README duplicates the partial's content (drift, Principle 16); zero clobber surface (Principle 3). Explorer B (reproducibility): YES, one lean working file recording WHICH image the project uses (e.g. claude-code vs codex), a project-level fact captured nowhere else in the repo, so setup is not tribal knowledge (Principle 7). DECIDED (human, 2026-07-18): Option A, GUIDANCE-ONLY, no dropped file. Rationale: agent-box config is a per-user global file so there is nothing project-local to own; the one project-level fact (image choice) is thin and a scaffolded template risks an empty stub or duplicating the partial (Principle 16); it is the safest shape (Principle 3, zero clobber surface) and lands the setup where the orchestrator already reads it at preflight (Principle 1). Folded into the `optional-modules` increment-3 step detail."""
folded_into = "optional-modules"

[[question]]
id = "Q-42"
status = "decided"
ask = """a checkable receipt that the human-input contract was presented at every human-decision point: the human observed (2026-07-18) that the `Q-40` decision was acceptable because they were presented the options, trade-offs, a recommendation, and principle-judged reasoning before deciding, and asked that the workflow GUARANTEE this every time a human decides, with a durable receipt/proof that it happened. The human-input-contract RULE already requires this presentation; what is missing is a checkable receipt and enforcement (the same rule-then-detection pattern `workflow-invariants`/W3 applied to convergence). Partial receipts already exist (`type:"escalation"` and `type:"intake"` records; decided Open-Questions items folded into steps), so this generalises them. Key design nuance for genuine PROOF vs orchestrator self-attestation: the strongest receipt records the OPTIONS PRESENTED plus the human's SELECTION among them (choosing option Y from {X,Y,Z} inherently proves {X,Y,Z} was shown), rather than a self-certified "I presented the contract" flag. Candidate approaches to weigh: (a) a new `type:"decision"` JSONL receipt (question id, options presented, recommendation, human's choice) plus a `validate --workflow` check (a W4 analog) that every `decided` queue item has a matching receipt, coherent with the round-log/ledger split (Principle 16 with the accepted round-vs-narrative duplication, Principle 6 checkable); (b) a lighter in-queue standard: every `decided` item must carry the presented options + the choice inline, with a completeness check over the prose (less machinery, weaker check); (c) rely on git history + the existing escalation/intake records + AskUserQuestion structured answers, no new mechanism (Principle 2 minimal, but no deterministic proof, under-delivers on the ask). COUPLES to `escalation-exempt` (`Q-40`): escalation acceptance is itself a human decision that would carry a receipt, and both make W3 read human-decision records, so `escalation-exempt`'s build is held until this path is chosen so the two are designed coherently. The design space is genuinely open (receipt form, which decision points are covered, what makes proof genuine, whether to enforce), so a design pass (explorers) is a candidate before deciding. Trade-off the human should weigh: accountability/auditability of the decision process vs ceremony added to every decision point (Principle 2). A DESIGN PASS is owed (human-directed, 2026-07-18); the item points at `docs/plans/decision-receipts.explorations/`. The human is unclear on four things the pass must answer head-on: (1) the PURPOSE and what it AFFORDS the workflow (for whom, and what auditability of the decision process actually buys); (2) the TRADE-OFFS (the Principle 2 ceremony cost vs the benefit); (3) what it would concretely LOOK LIKE (form, where it lives, the check); and (4) how it RELATES to the plan, especially the Open Questions section and Principle 16 (single source of truth), is a receipt a duplicate of the decided queue item (an SSOT violation) or a genuinely distinct thing (the ATTESTATION that the contract-shaped presentation happened, vs the queue which holds the decision CONTENT). FIXED CONSTRAINT handed to the pass (established in deliberation, not re-open): receipts do NOT live in the ledger, because the ledger is per-task and DELETED at task close while decisions are permanent, and most decisions happen outside any review loop where no ledger exists; the ledger only narrates a mid-loop decision (a cap escalation, an accept-risk) as a POINTER to the durable receipt/queue, exactly today's escalation pattern. The NULL option (existing machinery, the Open Questions queue + `type:"escalation"`/`type:"intake"` records + git history + structured AskUserQuestion answers, already suffices, build nothing or only a light check) is a first-class candidate the pass must genuinely weigh, not a strawman. DESIGN PASS DONE (two explorers, `docs/plans/decision-receipts.explorations/receipt-system-{A,B}.md`; A skeptical/minimalist recommends NULL, B architect/steelman recommends the FULL receipt). They AGREE on three things that narrow the choice: (i) the LIGHT option (a prose-completeness check on queue items) is rejected by BOTH (a structural check over free prose parses at the wrong boundary, Principle 14, and is weaker than it looks); (ii) the CEILING, no orchestrator-authored artifact is adversarial PROOF, only auditable evidence, since the same orchestrator writes both the presentation and the receipt (the same ceiling W3 already accepts); the only truly unforgeable evidence is the human's own AskUserQuestion selection, which lives in the transcript/git outside the workflow artifacts; (iii) `escalation-exempt` (`Q-40`) is UNBLOCKED either way, it reads the existing `type:"escalation"` record for its W3 exemption regardless of this decision, and a decision receipt (if built) is a separate record for a separate check. So the real choice is a clean binary. FULL (B): a permanent `type:"decision"` JSONL record (`q_id`, `options`, `recommendation`, `chosen` with the validator enforcing `chosen` is a member of `options`, `ts`) written when a queue item goes `decided`, plus a W4 `validate --workflow` check that every `decided` item has a matching receipt (forward-looking, historical Q-1..Q-41 exempt). Genuineness comes from the options-on-record + `chosen in options`; SSOT resolved as queue=CONTENT (what/why) vs receipt=PROCESS ATTESTATION (options+choice), q_id-linked, the same accepted split as the ledger-narrative vs JSONL-round-record. NULL (A): build nothing; a well-formed `decided` queue item ALREADY records options+recommendation+choice+reasoning in prose (`Q-41` is the existence proof), so a JSONL receipt is a SECOND permanent hand-authored home for the option-labels+choice -> Principle 16 drift with only a soft resolver; and since the orchestrator authors both, the receipt is no more trustworthy than the queue it duplicates, so it fails Principle 3 (no motivating incident; adds no independent trust). A's crux: W3's justification does NOT transfer, W3 guards a SILENT unsupervised skip, but a human is PRESENT at every decision, so a missing presentation is not silent. Optional A add-on: one AGENTS.md sentence making "a `decided` item records the options presented and the human's choice inline" the item standard, no new machinery. Orchestrator recommendation: leaning FULL (B) with A's constraints folded in (record only option LABELS + choice, never the reasoning, so the duplication is bounded and the queue stays authoritative for content; frame it honestly as enforced auditability, NOT proof), because the project's own revealed philosophy is enforce-over-trust (W3, the metrics validator, the drift guards, the ASCII check all exist for exactly this) and the human asked for a checkable guarantee; the honest counterweight is A's permanent-double-authoring SSOT cost and that the receipt cannot prove presentation, only that a structured record exists. NOTE for whoever builds it: B's document is internally inconsistent on whether to add `q_id` to `escalation`/`intake` records (its main text says add it; its YAGNI says do not and keep them separate); resolve toward KEEPING them separate (one purpose per record, Principle 16), a `decided` queue item gets its own decision receipt. HUMAN CHOSE FULL over NULL (2026-07-18): build a checkable decision receipt. BUT the human then noticed the SSOT hole A poked (a JSONL receipt is a second permanent home for the option-labels+choice) and proposed encoding the receipt as STRUCTURED DATA projected into the human-readable plan, so it is single-sourced. So the FULL direction is chosen, but the receipt's ENCODING/HOME is REOPENED as `Q-43`; the build waits on it. This item is resolved on direction only; the encoding decision is `Q-43`. RESOLVED: built as the `decision-receipt` step (Q-44 pilot 1); status updated to folded there."""
folded_into = "decision-receipt"

[[question]]
id = "Q-43"
status = "superseded"
ask = """how the (chosen) Full decision receipt is ENCODED and where it lives, plus the broader structured-plan idea it touches: the human chose to build a receipt (`Q-42`) but flagged that Explorer B's raw JSONL record is a second permanent hand-authored home for the option-labels+choice (the Principle 16 drift A poked), and proposed encoding the receipt as STRUCTURED DATA with a single home, then having `agent-scaffold` PROJECT it into the human-readable plan/status view. Three contender encodings to weigh: (a) B's `type:"decision"` JSONL record (matches existing instrumentation records, opt-in, leaves the core plan format untouched, but is the second home); (b) a structured block on the `decided` Open-Questions item in the plan (single home, co-located, but complicates `src/plan.rs` and changes the scaffolded plan format for every project); (c) structured receipt source + a projection/render into the human-readable view (single source, derive the view, closes the SSOT hole AND keeps the plan readable; costs a render capability that OVERLAPS the deferred `workflow-viz`). Orchestrator lean: (c), most Principle-16-aligned (one source, derive the view). SEPARATE, LARGER question this touches, recorded here but explicitly NOT bundled into the receipt build: the human's broader idea of formalising the WHOLE plan document into a uniform, machine-parseable structured file format rendered to a human view. Orchestrator caution (for its own weighing later): the plan is ~80% reasoning narrative; fully structuring a prose-heavy document fights the format (prose-in-string-fields), loses direct Markdown editing and the self-contained resume-context value (Principle 20), and is a behavior change for every scaffolded project, while the metadata regions `src/plan.rs` already parses (Roadmap + Open Questions) are the parts that genuinely benefit; the projection/visualisation half overlaps the deferred `workflow-viz`. So weigh the full rewrite on its own merits separately; the receipt only needs the narrow structured-receipt-plus-projection win. A FOCUSED DESIGN PASS is owed (human-directed, 2026-07-18); the item points at `docs/plans/receipt-encoding.explorations/`. It weighs ONLY the three encodings (a)/(b)/(c) for the already-chosen Full receipt, and is explicitly SCOPED OUT of the full-plan-rewrite (that larger question is noted here, not designed). Fixed inputs the pass may not re-open: the Full receipt is chosen (not null); the receipt records the options presented + recommendation + the human's choice with a check that the choice is among the options, plus a W4 `validate --workflow` check that every `decided` item has a receipt (forward-looking); receipts do NOT live in the ledger; `escalation`/`intake` records stay separate (one purpose per record). The pass must give concrete COST ACCOUNTING per encoding: `src/plan.rs` parser changes, `src/metrics.rs` changes, the W4 check in `src/workflow.rs`, the pack plan-template FORMAT change and its blast radius across every scaffolded project, and for (c) exactly how much projection/render machinery is needed and whether it forces the deferred `workflow-viz` to come first or a thin render suffices. It should note the existing `status --json` plan->JSON projection as prior art for (c). DESIGN PASS DONE (two explorers, `docs/plans/receipt-encoding.explorations/receipt-encoding-{A,B}.md`; A minimalist recommends (a), B architecture recommends (c)). They CONVERGE far more than they differ: BOTH reject (b) (the in-plan structured block: 60-100 lines of multi-line parser in `src/plan.rs` past its deliberate no-prose boundary, and an UNCONDITIONAL `pack/plan-template.md` queue-item format change every scaffolded project inherits whether or not it ever records a decision, Principles 2+3), and BOTH agree the receipt SUBSTRATE is identical: a `type:"decision"` JSONL record (`q_id`, `options`, `recommendation`, `chosen` with a validator check that `chosen` is a member of `options`, optional `ts`), a new `metrics::parse_decisions` projection, a W4 `validate --workflow` check that every `QUEUE_FOLD_PREFIX` (`decided`) item has a matching `q_id` receipt (forward-looking, historical Q-1..Q-41 exempt via the log's absence), `src/plan.rs` and the plan-template BYTE-IDENTICAL, plus the CONVENTION that a `decided` item's prose does NOT re-enumerate the option labels (the receipt is their machine home; the prose carries rationale + the pointer), stated in `pack/AGENTS.md`/`pack/plan-template.md`. The SOLE difference is a ~30-35 line thin RENDER in the existing `status` command (a `DecisionProjection` slot in `Projection`, populated from `parse_decisions`, shown in `status --json` and the human summary): A says defer it (it is (a)-plus-sugar, does not itself touch the queue prose, and belongs in the planned `state-queries` step that already extends `status`); B says build it now because it creates a derived DISPLAY surface that makes the no-re-enumerate convention SELF-REINFORCING (the orchestrator, seeing options+choice already shown by `status`, has no pull to hand-copy them into prose), and BOTH note it naturally folds into `state-queries`. It is NOT the deferred `workflow-viz` (a live streaming Gantt over a dispatch/return event log, different scope); it is a one-time read of committed data like `status` already does. Orchestrator recommendation: build the SUBSTRATE (JSONL `type:"decision"` record + `chosen in options` + W4 + drift-guard + `instrument.md` docs + the convention) as a new `decision-receipt` step now (classify RISKY, it extends the enforcement backstop like `workflow-invariants`/W3 did -> two clean rounds), and FOLD the thin `status` render into the already-planned `state-queries` step where both explorers agree it belongs (keeping this increment tight; the receipt+W4 is the guarantee, the render is human-convenience, and its interim absence only means options+choice are read from the JSONL until `state-queries` lands). Awaiting the human's confirmation of t