id = "Q-51"
status = "decided"
folded_into = "workflow-driver"
receipt = "Q-51"
ask = """encode the workflow itself as a deterministic state-machine DRIVER (not just a post-hoc checker) to combat AGENT DRIFT as the workflow grows and accrues detail (agents forget to apply rules): the human proposed (2026-07-19) making `agent-scaffold` a Mealy-machine REPL that the orchestrator (or any agent/human) runs to keep driving the loop. It would (a) parse the current codebase + plan/ledger/metrics state into valid internal control states, (b) print a summary of the current state, the valid transitions it can take, and CRUCIALLY the next INSTRUCTION PROMPT for the agent (the role prompt with context filled in) based on that state, plus periodic reminders (for example the Project Principles). Documentation instructs agents to run it to receive further instructions, so the control flow lives in a deterministic program rather than in fallible agent memory. This is the natural third stage of the structured-data direction (structured SOURCE `plan.toml` -> structured ENFORCEMENT `validate --workflow` -> structured DRIVING, this idea) and builds directly on the machine-readable plan the `structured-skeleton` initiative just delivered. ORCHESTRATOR REFRAMING (to weigh in the design pass): it is not one global Mealy machine but a FLEET of per-unit control FSMs (one per active step / increment / review loop), the tool tracking the set and emitting the next instruction for each READY unit, and also acting as a DEPENDENCY SCHEDULER over the plan's `blocked_by` DAG (computing what may run in parallel now); the tool must own only CONTROL transitions and consume agent/human JUDGMENT as inputs (a triage verdict, a human decision, a commit), never make the judgments itself (get that boundary wrong and it either straitjackets or hallucinates decisions). HUMAN'S CONCERNS to resolve: (1) interaction with the writer-isolation tiers (orthogonal: the tool instructs, the orchestrator isolates; the tool reads durable state on main and can emit the resolved tier as part of the instruction); (2) parallel steps (the per-unit-FSM fleet + dependency scheduling above); (3) concrete inputs and outputs (candidate: input = the durable state plus event-recording subcommands like `record-round --outcome clean` that append the log AND advance state atomically, Principle 13; output = a per-unit state summary + valid transitions + the filled next-instruction prompt + Principle reminders, as JSON and human text; keep it STATELESS, recompute from the files each call so it survives crashes/compaction); (4) what is missing. ADDITIONAL CONSIDERATIONS the orchestrator raises for the pass: the tool would become the SOURCE of the workflow LOGIC (convergence/sequencing move from AGENTS.md prose into Rust), the strongest anti-drift property but the biggest cost, and the prose and code could themselves drift unless the AGENTS.md workflow section is GENERATED from the machine definition (the same render closure just built for the plan); ESCAPE HATCHES for exceptions and human overrides are mandatory or the tool becomes a cage; ADOPTION should be EVIDENCE-FIRST (Principle 6), start ADVISORY (the agent drives, the tool suggests, measure whether drift drops) then deepen to authoritative driving, mirroring the receipt/waiver pilots; and this OVERLAPS the queued drift-mitigation cluster (the re-grounding + provenance step and the `Q-50` doc-currency core guidance), so the pass must weigh whether the driver SUBSUMES them. This is a MAJOR initiative, larger than `structured-skeleton`, and genuinely design-open, so it is `exploring`: the human directed (2026-07-19) queueing the exploration FIRST, before folding the Q-50 / re-grounding work it overlaps. A multi-explorer design pass is owed (candidate lenses: a formal-FSM + concurrency model; the tool-vs-prose single-source boundary + AGENTS.md generation; the I/O contract + isolation/harness integration + advisory-first adoption; and a YAGNI/skeptic lens weighing the state-machine driver against the lighter drift mitigations), synthesised, then moved to `open` with options for the human. Design record: `docs/plans/mealy-workflow-driver.explorations/`. DESIGN PASS DONE (2026-07-19): four independent explorers (fsm-concurrency, tool-vs-prose, io-contract-and-adoption, yagni-skeptic) synthesised in `synthesis.md`. STRONG CONVERGENCE: build the ADVISORY MVP first (a read-only, stateless `agent-scaffold next` reusing the W3/W4/W5 reconstruction already shipped, largely the already-planned `state-queries` step plus a next-action reminder), DEFER the full driver (per-unit FSM fleet, `blocked_by` scheduler, event-recording write-path, AGENTS.md-from-machine generation, authoritative driving) behind an EVIDENCE GATE, single-source the convergence CONSTANTS to close the existing `required_streak`/AGENTS.md duplication, and treat the driver as COMPLEMENTING (not subsuming) the re-grounding step and Q-50 (un-gate those; Q-50 is a prerequisite if the driver is built). Options for the human: (A) build the advisory MVP evidence-gated [all four explorers recommend]; (B) build the full driver now [rejected as premature, a subsystem larger than structured-skeleton hardening an evolving workflow]; (C) do not build, rely on the lighter drift mitigations. Orchestrator recommendation: (A). HUMAN DIRECTION (2026-07-19): go with the FULL DRIVER (Option B) as the TARGET, but a DEEPER design pass is owed FIRST, brainstorm the design space, requirements, scope, and possible user flows before committing to a build, so this stays `exploring` (a second design pass owed, not yet decided). Orchestrator note carried into that pass (honouring the skeptic's main objection while enabling the full driver): keep the workflow LOGIC DATA-DRIVEN (a spec the tool interprets, not hardcoded Rust) so the workflow can still evolve without heavy code churn, and STAGE the build (the advisory tier is the natural first increment on the path to the full driver, reusing the W3/`state-queries`/`render` machinery). ROUND 2 exploration queued (lenses: requirements + scope; user flows / end-to-end scenarios; design-space breadth / fullest vision + staging; architecture + incremental build path). On synthesis, present a fuller design + a concrete staged build plan for the human to refine, then decide with a receipt. Round-2 design record: `docs/plans/mealy-workflow-driver.explorations/` (r2-* + r2-synthesis.md). DESIGN SHAPE DECIDED (2026-07-19): ORQ-1 terminal authority = ADVISORY + validated event-RECORDING, NON-BLOCKING in-loop, with an OPT-IN boundary gate (`validate --workflow --strict` in CI or a pre-commit hook, reusing the checks/hook pattern) for hard enforcement at the LANDING boundary (this also answers ORQ-2: gate at the boundary, not per-step, keeping the loop robust, harness-agnostic, least-authority, and Q-24-respecting). ORQ-3 (multi-repo) defaults to single-project (far-stage). ORQ-4 (spec-change ceremony): `workflow.toml` is load-bearing config, so edits go through the normal plan + review like AGENTS.md changes, no new ceremony. ORQ-5 (reminder cadence): light, each `next` surfaces only the reminders relevant to the current action. READY TO FOLD: a `workflow-driver` staged umbrella (Stage 0a the `workflow.toml` control-constants spec + single-source the convergence constants into W3, closing the `required_streak`/AGENTS.md duplication; 0b generate the AGENTS.md control fragment from the spec, byte-guarded; 1 the advisory read-only `next` MVP, ~the planned `state-queries` + a next-action reminder; 2 type the `src/driver/` FSM engine with a shared reconstructor; 3+ the `blocked_by` scheduler, generation-widening, the guarded `record-*` write-path [reopens Q-24], and the opt-in authoritative boundary gate, all evidence-gated) carrying the decided design (data-driven-constants spec + Rust transition function; the projection-family framing where `validate`=backward, `status`=summary, `next`=forward, `render`=prose; the control-vs-judgment boundary enforced by types; semi-authoritative non-blocking recording). Q-51 is a DECIDED item once folded, with a receipt: the human chose the FULL DRIVER (staged) over the four explorers' advisory-MVP-only recommendation."""

[[question]]
id = "Q-52"
status = "exploring"
ask = """a deterministic, statistical-evidence-backed way to determine whether code is EARNING ITS KEEP (useful and worth keeping) vs accrued cruft/maintenance burden, run periodically (manually or in the workflow, e.g. at the acceptance/UAT step), likely MULTIPLE methods working together: the human raised (2026-07-19) that AI-accelerated development accrues code and maintenance burden faster, making keep-or-cut discipline the bottleneck, and asked for the prior art and how to OBJECTIVELY determine code usefulness. ORCHESTRATOR STARTING ANSWER (to be verified and extended by a WebSearch-backed research pass, since knowledge has a cutoff): usefulness is not intrinsic but RELATIONAL, made objective by making it FALSIFIABLE, the direct analog of mutation testing (mutation asks 'if I change this, does a test catch it?'; usefulness asks 'if I REMOVE this, does anything observably notice?'). Operational definition: code earns its keep iff removing it causes an observable loss (a test fails, the build breaks, a downstream dependency breaks, a production metric/behavior changes, or a documented requirement / public-API contract is violated). PRIOR-ART CLUSTERS to survey and cite: (1) static unused-code/reachability detection (compiler/linter dead-code, call-graph, `cargo-udeps`/`cargo-machete`, vulture, staticcheck, Knip, tree-shaking), blind to reflection/FFI/dynamic-dispatch/public-API; (2) dynamic/production usage (coverage as necessary-not-sufficient, PRODUCTION coverage / 'dark code' sampling, feature-usage telemetry tying code to user value); (3) DEBLOATING research (CHISEL, RAZOR, TRIMMER, piecewise compilation; delta-debugging / 1-minimality, Zeller), operationalizing keep-what-observed-use-needs; (4) mutation testing and its INVERSE, 'pseudo-tested methods' (Niedermayr et al.: body-nulling survives all tests -> effectively untested/weak-value), generalizable to a DELETION experiment; (5) behavioral-code-analysis / maintenance-cost hotspots (Tornhill/CodeScene churn x complexity, Feathers), the burden side; (6) traceability/provenance (code mapping to no requirement/test/API contract is suspect; connects to this repo's provenance direction). MULTI-SIGNAL DESIGN to propose: combine reachable/depended-on? (static) + exercised? (coverage) + deletion-safe? (deletion/pseudo-test mutant survives tests + canary, the strong signal) + traceable? (requirement/API contract; public API a legit keeper) + cost>value? (hotspot) into an ADVISORY report of candidates-not-earning-their-keep with per-signal evidence, fed into the triage/implement loop where a human decides each deletion (NEVER auto-delete; Chesterton's Fence; public-crate API surface excluded or deprecation-cycled). WORKFLOW FIT: run periodically at acceptance/UAT or on a cadence, reusing the `checks` module (already runs lint/format/test/mutation kinds in an isolated worktree) + the `review` entry mode; the deletion experiment maps onto the planned mutation module. This is `exploring`: the human directed (2026-07-19) recording it now and running the research pass AFTER the Q-51 Mealy exploration synthesises. A WebSearch-backed research pass is owed (lenses: a prior-art survey with citations; the concrete multi-signal design + `checks`/`review`/`mutation` composition; a skeptic lens on false-positives, the public-API/semver problem, and the auditor's own maintenance cost). Design record: `docs/plans/code-value-audit.explorations/`."""

