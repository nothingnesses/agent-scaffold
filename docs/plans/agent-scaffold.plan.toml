[[question]]
id = "Q-23"
status = "decided"
ask = 'compaction lifecycle discoverability in onboarding: the "Getting started, for the human" section did not mention the compaction-prep / resume prompts. Decided (human, thin pointer): add a short pointer in Getting started naming `.agents/user-prompts/compaction-prep.md` (paste before a compaction) and `resume.md` (paste to continue after one), no duplication of the procedure; land it as part of `human-review-queue`. Decision and reasoning in `human-review-queue`.'
folded_into = "human-review-queue"

[[question]]
id = "Q-22"
status = "decided"
ask = "prose line-wrapping and the formatter: whether agents police line length, and whether the tooling owns wrapping. Decided (human): no manual hard-wrapping and line length is never a review finding (a workflow convention plus a reviewer/triager rule); and adopt `prettier` `proseWrap: never` via a repo-root `.prettierrc.json` so the existing `nix fmt` markdown formatter actively unwraps prose and owns wrapping (accepting a one-time repo-wide reflow). Decision and reasoning in `no-wrap-convention`; user preference also in memory (`no-hard-wrap-prose`)."
folded_into = "no-wrap-convention"

[[question]]
id = "Q-21"
status = "decided"
ask = "between-step checkpoint cadence: how the orchestrator behaves at a step boundary. Decided (human, `(d)`+`(b)`): configurable at kickoff, defaulting to report-and-continue (the orchestrator reports what completed and what is next, then continues; the human can opt into gating each boundary, and can interrupt via intake at any time). Decision and reasoning in `human-review-queue`."
folded_into = "human-review-queue"

[[question]]
id = "Q-20"
status = "decided"
ask = """gate-prompt clarity: `clarifying-questions.md` and `open-questions-gate.md` are agent-run human-decision gates (the "me" in them is the human), not agent-only role prompts; their "ask me" wording is imprecise about the sub-agent -> orchestrator -> human routing, and the README labels them "one prompt per workflow role" though they are planner-phase gates. Decided: keep them as the planner's gate prompts (do not fold into `planner.md`), fix the routing wording, and correct the README label. Recovered from the transcript ([07-11T10:17] "answer at the gates"); a compaction had flattened "human-decision gate" into "agent-facing role prompt". Decision and reasoning in `gate-prompt-clarity`."""
folded_into = "gate-prompt-clarity"

[[question]]
id = "Q-24"
status = "decided"
ask = "instrumentation data integrity: the `--instrument` metrics log is written by the orchestrator (an LLM) as hand-authored JSONL (`Q-6`), so records are not guaranteed well-formed. Decided (human): guarantee structure by DETECTION, not prevention, the `state-schema` `validate` subcommand checks `docs/metrics/workflow.jsonl` against a schema defined once (the record types and fields fixed in `pack/instrument.md`), reporting or rejecting malformed records, so the data is deterministically verifiable and bad lines are discardable. `instrument-flag` keeps its tool-free direct-write (no runtime dependency on the binary during a workflow run, honouring the harness-agnostic constraint), so `Q-6` is NOT reopened. A validated-append writer (prevention) was considered and declined because it would require the `agent-scaffold` binary on PATH at workflow-run time. Decision and reasoning in `state-schema`."
folded_into = "state-schema"

[[question]]
id = "Q-25"
status = "decided"
ask = 'module design: the `[[module]]` schema, the module set, and the deterministic-checks module. Decided (human, design pass): a hybrid schema (asset `module = "<name>"` tags + a `[[module]]` metadata section) with a `--module` flag; the priority modules are a deterministic-checks module (a user-configurable, pluggable lint/format gate, `ast-grep` first-party, implementer applies formatters while a read-only `checks-reviewer` runs linters and check-mode formatters into a findings file the triager adjudicates) and the isolation module (agent-box/agent-images pointer setup), built machinery -> checks -> isolation. Decision and reasoning in `optional-modules`.'
folded_into = "optional-modules"

[[question]]
