[[principle]]
n = 1
name = "Prefer the cleaner long-term architecture over the smallest diff"
text = "prioritise correctness, internal coherence, and maintainability, and when a local fix conflicts with a cleaner design, choose the cleaner design unless a concrete limitation prevents it."

[[principle]]
n = 2
name = "Minimal by default"
text = "The core does one thing well; everything else is an optional module the user opts into. Adding a module must not complicate the core."

[[principle]]
n = 3
name = "Safe on existing projects"
text = "Scaffolding into a populated repo must never clobber or silently overwrite existing files. Prefer create-if-absent, namespaced locations, and clearly marked idempotent edits."

[[principle]]
n = 4
name = "Idempotent"
text = "Running the tool twice produces the same result as running it once, with no duplicated blocks and no drift."

[[principle]]
n = 5
name = "Make illegal states unrepresentable"
text = "Work out the valid inputs and outcomes first and encode them, rather than admitting bad states and guarding against them at runtime."

[[principle]]
n = 6
name = "Ground decisions in evidence"
text = "Before an approach is built out, validate it with a small proof-of-concept that builds and produces the expected output. If the candidates are exhausted, raise the impasse for a decision rather than forcing through an unvalidated approach."

[[principle]]
n = 7
name = "Reproducible"
text = "Prefer the project's existing toolchain conventions (Nix, just, direnv) so a scaffolded project and its checks behave the same on any machine."

[[principle]]
n = 8
name = "Structured data first, project for humans"
text = "Prefer machine-readable structured formats as the single source for the data the workflow operates on (plan status, the decision queue, decisions/receipts, relationships, metrics), and derive human-readable views by projection, rather than hand-authoring prose that is also the machine input. At this pre-adoption stage, prioritise the best long-term design, architecture, and implementation over backwards-compatibility, API stability, or minimal-diff blast radius; those become constraints once the project has adoption and stability guarantees. Decided by the human 2026-07-18; when this conflicts with Principle 2 (minimal) or Principle 3 (safe on existing projects) at this stage, this wins, and it sharpens Principle 1 (cleaner long-term architecture) and Principle 16-equivalent one-source-of-truth thinking."
