# Built-in default pack manifest. Declares which assets this pack drops and how:
# the source file each comes from, where it lands, whether it is a tool-owned
# reference asset or a user working file, and whether it is rendered (variable
# substitution) or copied verbatim. One source may map to several assets (the
# guidance is dropped as both the working root file and the reference copy).

# Optional modules the pack declares. A module is off by default; its assets and
# variables (tagged `module = "<name>"`) drop only when `--module <name>` selects
# it, and its `guidance` partial concatenates into the `{{modules}}` render slot.
# With no module selected the output is byte-identical to the core.
[[module]]
name = "checks"
description = "A user-configurable, tool-run deterministic verification gate (lint/format checks) over the workflow's code output, with a checks-reviewer spawned in the work-review phase that runs the checks and reports findings (authoring no fixes)."
guidance = "checks-guidance.md"

[[asset]]
source = "AGENTS.md"
dest = "AGENTS.md"
ownership = "working"
render = true

[[asset]]
source = "plan-template.md"
dest = "docs/plans/TEMPLATE.md"
ownership = "working"

[[asset]]
source = "AGENTS.md"
dest = ".agents/AGENTS.reference.md"
ownership = "reference"
render = true

[[asset]]
source = "prompts/orchestrator.md"
dest = ".agents/prompts/orchestrator.md"
ownership = "reference"

[[asset]]
source = "prompts/planner.md"
dest = ".agents/prompts/planner.md"
ownership = "reference"

[[asset]]
source = "prompts/clarifying-questions.md"
dest = ".agents/prompts/clarifying-questions.md"
ownership = "reference"

[[asset]]
source = "prompts/open-questions-gate.md"
dest = ".agents/prompts/open-questions-gate.md"
ownership = "reference"

[[asset]]
source = "prompts/reviewer.md"
dest = ".agents/prompts/reviewer.md"
ownership = "reference"

[[asset]]
source = "prompts/triager.md"
dest = ".agents/prompts/triager.md"
ownership = "reference"

[[asset]]
source = "prompts/implementer.md"
dest = ".agents/prompts/implementer.md"
ownership = "reference"

[[asset]]
source = "principles.toml"
dest = ".agents/principles.toml"
ownership = "reference"

[[asset]]
source = "LEDGER.template.md"
dest = ".agents/LEDGER.template.md"
ownership = "reference"

# Human-invoked prompts (a human copies, fills in, and pastes these to drive the
# workflow), kept separate from the role prompts under `.agents/prompts/`.
[[asset]]
source = "user-prompts/kickoff.md"
dest = ".agents/user-prompts/kickoff.md"
ownership = "reference"

[[asset]]
source = "user-prompts/explore.md"
dest = ".agents/user-prompts/explore.md"
ownership = "reference"

[[asset]]
source = "user-prompts/review.md"
dest = ".agents/user-prompts/review.md"
ownership = "reference"

[[asset]]
source = "user-prompts/pause.md"
dest = ".agents/user-prompts/pause.md"
ownership = "reference"

[[asset]]
source = "user-prompts/compaction-prep.md"
dest = ".agents/user-prompts/compaction-prep.md"
ownership = "reference"

[[asset]]
source = "user-prompts/resume.md"
dest = ".agents/user-prompts/resume.md"
ownership = "reference"

# The `checks` module (opt in with `--module checks`). Its assets are tagged
# `module = "checks"`, so they drop only when the module is selected and the
# module-free default scaffold stays byte-identical.

# The user-owned checks config: a create-if-absent working file the user edits,
# copied verbatim (no render). Its comments document the `[[check]]` schema.
[[asset]]
source = "checks.toml"
dest = ".agents/checks.toml"
ownership = "working"
module = "checks"

# The seeded first-party ast-grep scaffold: the project config and one example
# rule, so `ast-grep scan` runs out of the box. Both are create-if-absent working
# files (a project curates its own rules), copied verbatim.
[[asset]]
source = "checks/ast-grep/sgconfig.yml"
dest = ".agents/checks/ast-grep/sgconfig.yml"
ownership = "working"
module = "checks"

[[asset]]
source = "checks/ast-grep/rules/no-dbg-macro.yml"
dest = ".agents/checks/ast-grep/rules/no-dbg-macro.yml"
ownership = "working"
module = "checks"

# The checks-reviewer role prompt (reports findings, authors no fixes), a
# tool-owned reference asset.
[[asset]]
source = "prompts/checks-reviewer.md"
dest = ".agents/prompts/checks-reviewer.md"
ownership = "reference"
module = "checks"

# The inert, opt-in pre-commit hook. It is namespaced under `.agents/` and is NOT
# installed into `.git/hooks/` by scaffolding, so it changes no git behaviour until
# the user activates it (via `--with-precommit-hook`, which installs a delegating
# `.git/hooks/pre-commit` create-if-absent, or the documented symlink one-liner).
# It delegates to `agent-scaffold checks --staged` so it never drifts from
# `checks.toml`. A tool-owned reference asset, dropped executable so a symlink or a
# delegating install can run it directly.
[[asset]]
source = "hooks/pre-commit"
dest = ".agents/hooks/pre-commit"
ownership = "reference"
module = "checks"
executable = true
