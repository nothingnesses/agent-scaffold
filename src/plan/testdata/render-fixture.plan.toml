# Fixture <task>.plan.toml for the render engine (Inc 3). This is NOT a live plan;
# it drives the render golden and the render/check tests. It exercises every
# generated fragment: a derived Status line (all seven step statuses represented,
# the open + exploring unresolved-question count, two waivers), the generated status
# vocabulary, a Roadmap with a blocked_by marker and inline waivers, a
# decided/superseded question queue, numbered principles, and the
# front/step/question/tail prose sidecars spliced verbatim. It also pins the
# ordering claims: two steps share order 5 to exercise the slug tiebreak, and Q-9 /
# Q-10 pin the numeric (not lexical) question sort. It validates clean.

[meta]
title = "Render fixture"
primary = "toml"

[meta.sidecars]
front = ["render-fixture.intro.md", "render-fixture.motivations.md", "render-fixture.repo-layout.md"]
tail = "render-fixture.success-criteria.md"

[[step]]
slug = "alpha"
title = "The first step"
status = "complete"
order = 1

[[step.increment]]
id = "alpha-inc1"
risk_class = "risky"

[[step.waiver]]
id = "alpha-w1"
unit = "increment"
increment = "alpha-inc1"
reason = "accepted-at-escalation"
evidence_tier = "record-backed"
evidence = "alpha-inc1"
note = "Accepted below its streak at a human escalation."

[[step]]
slug = "beta"
title = "The second step"
status = "in-progress"
order = 2
blocked_by = ["alpha"]

[[step.waiver]]
id = "beta-w1"
unit = "step"
reason = "predates-logging"
evidence_tier = "self-declared"

[[step]]
slug = "gamma"
title = "The third step"
status = "next"
order = 3
blocked_by = ["beta"]

[[step]]
slug = "delta"
title = "The fourth step"
status = "not-started"
order = 4

# `zeta` and `epsilon` share order 5. `zeta` is declared FIRST here, so the sort's
# slug tiebreak (not insertion order) is what puts `epsilon` before `zeta` in the
# Roadmap: a regression that drops the tiebreak would leave `zeta` first.
[[step]]
slug = "zeta"
title = "The optional step"
status = "optional"
order = 5

[[step]]
slug = "epsilon"
title = "The skipped step"
status = "skipped"
order = 5

[[step]]
slug = "eta"
title = "The deferred step"
status = "deferred"
order = 6

[[question]]
id = "Q-1"
status = "open"
ask = "An open ask still awaiting a decision."

[[question]]
id = "Q-2"
status = "decided"
ask = "A decided ask folded into alpha."
folded_into = "alpha"
receipt = "Q-2"

[[question]]
id = "Q-3"
status = "superseded"
ask = "A superseded ask, replaced by a later item."
superseded_by = "Q-1"

# Q-9 and Q-10 pin the NUMERIC question order: Q-10 must sort AFTER Q-9 (a lexical
# sort would place Q-10 right after Q-1). Q-9 is `exploring`, an unresolved sub-state
# of open, so the derived Status line counts it (Q-1, Q-9, Q-10 = 3 open questions).
[[question]]
id = "Q-9"
status = "exploring"
ask = "An exploring ask, still owed a design pass."

[[question]]
id = "Q-10"
status = "open"
ask = "A tenth open ask, to pin numeric ordering past Q-9."

[[principle]]
n = 1
name = "Ask clarifying questions before forging ahead"
text = "Confirm intent before writing code, and give recommendations with reasoning."

[[principle]]
n = 8
name = "No silent scope expansion"
text = "Do what was asked and flag anything else rather than quietly doing it."
